version: "3.9"

services:
  db:
    image: postgres:16
    container_name: login_db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:                        
    build: .
    container_name: login_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
  
  tunnel:                          
    image: cloudflare/cloudflared
    restart: always
    command: tunnel --url http://api:8000
    depends_on:
      - api

volumes:
  postgres_data: